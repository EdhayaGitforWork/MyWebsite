# PostgreSQL
spring.datasource.url=jdbc:postgresql://postgresql:5432/authdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# JWT - secrets are provided via environment variables injected from Kubernetes Secrets
jwt.secret=${JWT_SECRET}
jwt.access-secret=${JWT_ACCESS_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expiration=86400000
# 86400000ms = 24 hours

# Allow Next.js origin
cors.allowed-origin=http://frontend-edhaya-anbalagan-dev.apps.rm1.0a51.p1.openshiftapps.com

#HikariCP
spring.datasource.hikari.initializationFailTimeout=60000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.maximumPoolSize=5

#Actuator
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=enquiry-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.profile.mywebsite_backend.dto

# AWS DynamoDB Configuration
aws.region=${AWS_REGION:eu-west-2}
aws.dynamodb.table-name=${AWS_DYNAMODB_TABLE_NAME:Enquiries}
