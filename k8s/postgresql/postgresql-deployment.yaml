apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgresql

  template:
    metadata:
      labels:
        app: postgresql

    spec:
      securityContext:
        fsGroup: 26

      containers:
        - name: postgresql

          image: postgres:16-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            # IMPORTANT
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
